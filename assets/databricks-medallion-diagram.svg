<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    MEDALLION ARCHITECTURE + DATA QUALITY
  </text>
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">
    Production-Ready ETL Pipeline Pattern
  </text>

  <!-- Data Sources -->
  <g transform="translate(100, 300)">
    <rect x="-60" y="-80" width="120" height="160" rx="10" fill="#374151" filter="url(#dropShadow)"/>
    <text x="0" y="-50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">📥 SOURCES</text>
    <text x="0" y="-25" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Kafka</text>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">APIs</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Files</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Databases</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Streaming</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="170" y1="300" x2="250" y2="300" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- BRONZE LAYER -->
  <g transform="translate(350, 300)">
    <rect x="-80" y="-120" width="160" height="240" rx="15" fill="url(#bronzeGrad)" filter="url(#dropShadow)"/>
    <text x="0" y="-85" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">🥉 BRONZE</text>
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.8">Raw Data</text>

    <rect x="-65" y="-45" width="130" height="150" rx="8" fill="#1e1e1e" opacity="0.3"/>

    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ Append-only ingestion</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ Source metadata</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ _ingested_at timestamp</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ _source_file tracking</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ _raw_data preserved</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">✓ Schema evolution</text>
  </g>

  <!-- Arrow 2 with DQ -->
  <g transform="translate(510, 300)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="15" y="-25" width="50" height="50" rx="25" fill="#10b981"/>
    <text x="40" y="5" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">DQ</text>
  </g>

  <!-- SILVER LAYER -->
  <g transform="translate(600, 300)">
    <rect x="-80" y="-120" width="160" height="240" rx="15" fill="url(#silverGrad)" filter="url(#dropShadow)"/>
    <text x="0" y="-85" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e1e1e" text-anchor="middle">🥈 SILVER</text>
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle" opacity="0.8">Cleansed Data</text>

    <rect x="-65" y="-45" width="130" height="150" rx="8" fill="#1e1e1e" opacity="0.2"/>

    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Deduplication</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Data type casting</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Null handling</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Standardization</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ MERGE upserts</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Incremental load</text>
  </g>

  <!-- Arrow 3 with DQ -->
  <g transform="translate(760, 300)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="15" y="-25" width="50" height="50" rx="25" fill="#10b981"/>
    <text x="40" y="5" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">DQ</text>
  </g>

  <!-- GOLD LAYER -->
  <g transform="translate(850, 300)">
    <rect x="-80" y="-120" width="160" height="240" rx="15" fill="url(#goldGrad)" filter="url(#dropShadow)"/>
    <text x="0" y="-85" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e1e1e" text-anchor="middle">🥇 GOLD</text>
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="12" fill="#1e1e1e" text-anchor="middle" opacity="0.8">Business Data</text>

    <rect x="-65" y="-45" width="130" height="150" rx="8" fill="#1e1e1e" opacity="0.2"/>

    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Aggregations</text>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Business logic</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ KPI calculations</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Dimensional models</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ Report-ready</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">✓ ML features</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="940" y1="300" x2="1020" y2="300" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Consumers -->
  <g transform="translate(1100, 300)">
    <rect x="-60" y="-80" width="120" height="160" rx="10" fill="#374151" filter="url(#dropShadow)"/>
    <text x="0" y="-50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">📤 CONSUMERS</text>
    <text x="0" y="-25" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">BI Tools</text>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Dashboards</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">ML Models</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">APIs</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Reports</text>
  </g>

  <!-- DQ Framework Box -->
  <g transform="translate(600, 550)">
    <rect x="-350" y="-40" width="700" height="100" rx="10" fill="#1e3a5f" filter="url(#dropShadow)"/>
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">
      ✅ DATA QUALITY FRAMEWORK
    </text>
    <text x="-250" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Null Checks</text>
    <text x="-150" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Duplicates</text>
    <text x="-50" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Schema Drift</text>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Value Ranges</text>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Referential</text>
    <text x="250" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Freshness</text>

    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">
      Severity Levels: ERROR (fails pipeline) | WARNING (alerts only) → Results persisted to monitoring.dq_results
    </text>
  </g>

  <!-- Monitoring Box -->
  <g transform="translate(600, 650)">
    <rect x="-350" y="-25" width="700" height="50" rx="8" fill="#3b82f6" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">
      📊 MONITORING: Job Health | Data Freshness | Cluster Costs | Query Performance → Slack/Teams Alerts
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 550)">
    <rect x="0" y="0" width="15" height="15" rx="3" fill="#10b981"/>
    <text x="25" y="12" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">DQ = Data Quality Checkpoint</text>
  </g>
</svg>
