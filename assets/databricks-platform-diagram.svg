<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="monitorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="qualityGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="costGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="governanceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="60" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">
    DATABRICKS PLATFORM BEST PRACTICES
  </text>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">
    A Framework for Production-Ready Data Platforms
  </text>

  <!-- Center Hub - Databricks -->
  <circle cx="600" cy="400" r="100" fill="url(#centerGradient)" filter="url(#shadow)"/>
  <circle cx="600" cy="400" r="85" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

  <!-- Databricks Logo Simplified -->
  <g transform="translate(600, 400)">
    <polygon points="-30,-35 0,-50 30,-35 30,0 0,15 -30,0" fill="#ffffff" opacity="0.9"/>
    <polygon points="-30,0 0,15 30,0 30,35 0,50 -30,35" fill="#ffffff" opacity="0.7"/>
  </g>
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
    DATABRICKS
  </text>
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.8">
    PLATFORM
  </text>

  <!-- Connecting Lines -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.2">
    <line x1="500" y1="400" x2="200" y2="250"/>
    <line x1="700" y1="400" x2="1000" y2="250"/>
    <line x1="500" y1="400" x2="200" y2="550"/>
    <line x1="700" y1="400" x2="1000" y2="550"/>
    <line x1="600" y1="300" x2="600" y2="150"/>
  </g>

  <!-- Animated pulse circles -->
  <circle cx="600" cy="400" r="110" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.3">
    <animate attributeName="r" from="110" to="150" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- PILLAR 1: Monitoring (Top) -->
  <g transform="translate(600, 150)">
    <rect x="-110" y="-50" width="220" height="100" rx="15" fill="url(#monitorGradient)" filter="url(#shadow)"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">📊 MONITORING</text>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Job Health Tracking</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Zombie Cluster Detection</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Data Freshness SLAs</text>
  </g>

  <!-- PILLAR 2: Data Quality (Top Left) -->
  <g transform="translate(200, 250)">
    <rect x="-110" y="-50" width="220" height="100" rx="15" fill="url(#qualityGradient)" filter="url(#shadow)"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">✅ DATA QUALITY</text>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">15+ Reusable Checks</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Schema Evolution</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Automated Alerting</text>
  </g>

  <!-- PILLAR 3: ETL Patterns (Top Right) -->
  <g transform="translate(1000, 250)">
    <rect x="-110" y="-50" width="220" height="100" rx="15" fill="url(#pipelineGradient)" filter="url(#shadow)"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">⚙️ ETL PATTERNS</text>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Idempotent MERGE</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Medallion Architecture</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Streaming Patterns</text>
  </g>

  <!-- PILLAR 4: Cost Optimization (Bottom Left) -->
  <g transform="translate(200, 550)">
    <rect x="-110" y="-50" width="220" height="100" rx="15" fill="url(#costGradient)" filter="url(#shadow)"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">💰 COST CONTROL</text>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Cluster Policies</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Table Optimization</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Query Performance</text>
  </g>

  <!-- PILLAR 5: Governance (Bottom Right) -->
  <g transform="translate(1000, 550)">
    <rect x="-110" y="-50" width="220" height="100" rx="15" fill="url(#governanceGradient)" filter="url(#shadow)"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">🔐 GOVERNANCE</text>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Unity Catalog</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Secret Management</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.9">Audit Logging</text>
  </g>

  <!-- Stats Bar at Bottom -->
  <rect x="150" y="680" width="900" height="80" rx="10" fill="#1e1e3f" filter="url(#shadow)"/>

  <!-- Stats -->
  <g font-family="Arial, sans-serif" fill="#ffffff" text-anchor="middle">
    <!-- Stat 1 -->
    <text x="300" y="715" font-size="28" font-weight="bold" fill="#3b82f6">15+</text>
    <text x="300" y="740" font-size="12" opacity="0.7">DQ Checks</text>

    <!-- Stat 2 -->
    <text x="480" y="715" font-size="28" font-weight="bold" fill="#10b981">5</text>
    <text x="480" y="740" font-size="12" opacity="0.7">Pillars</text>

    <!-- Stat 3 -->
    <text x="660" y="715" font-size="28" font-weight="bold" fill="#8b5cf6">30+</text>
    <text x="660" y="740" font-size="12" opacity="0.7">Code Files</text>

    <!-- Stat 4 -->
    <text x="840" y="715" font-size="28" font-weight="bold" fill="#f59e0b">82</text>
    <text x="840" y="740" font-size="12" opacity="0.7">Story Points</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="700" r="80" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="1150" cy="150" r="40" fill="#10b981" opacity="0.1"/>

  <!-- Footer -->
  <text x="600" y="780" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    github.com/JohnShuShu/databricks-platform-guide
  </text>
</svg>
